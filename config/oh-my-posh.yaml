---
# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
final_space: true
version: 4
upgrade:
  notice: false
shell_integration: true
patch_pwsh_bleed: true
async: true
palette:
  user: lightGreen
  elevatedUser: lightRed
  host: "#cda706"
  path: lightBlue
  shell: lightCyan
  packageManager: lightMagenta
blocks:
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: plain
        templates:
          - "{{ if .Root }}<p:elevatedUser>{{ .UserName }}</>{{ else }}<p:user>{{ .UserName }}</>{{ end }}"
          - "{{ if or .SSHSession .Env.IS_REMOTE }}@<p:host>{{ .HostName }}</>{{ end }}"
      - type: text
        style: plain
        template: ":"
      - type: path
        style: plain
        foreground: p:path
        options:
          style: full
          mapped_locations_enabled: false # disable unwanted registry mappings
          mapped_locations:
            "~": "~"
            "re:(.*/LukeSource)": "LS"
        template: "{{ .Path }}"
      - type: text
        style: plain
        template: ":"
      - type: shell
        style: plain
        foreground: p:shell
        template: "{{ .Name }}"
      - type: python
        style: plain
        options:
          cache_duration: 30s
        template: "{{ if .Venv }}:<p:packageManager>{{ .Venv }}@{{ .Full }}</>{{ end }}"
      - type: text
        style: plain
        template: ">"
...
